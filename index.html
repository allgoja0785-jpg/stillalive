<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speed Racer 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
      text-shadow: 0 0 10px rgba(255,255,255,0.7);
    }

    #title {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #00d9ff;
    }

    #speed {
      font-size: 24px;
    }

    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 64px;
      text-align: center;
      display: none;
      z-index: 20;
      text-shadow: 0 0 20px red;
    }

    #restart {
      margin-top: 20px;
      font-size: 24px;
      color: #00d9ff;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      z-index: 10;
      font-size: 16px;
      line-height: 1.7;
      background: rgba(0,0,0,0.4);
      padding: 15px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="title">SPEED RACER</div>
    <div id="speed">Speed : 0 km/h</div>
    <div id="score" style="font-size:22px; margin-top:8px;">Score : 0</div>
  </div>

  <div id="controls">
    W - 가속<br>
    S - 후진<br>
    A / D - 좌우 이동<br>
    SHIFT - 브레이크
  </div>

  <div id="gameOver">
    GAME OVER
    <div id="finalScore" style="font-size:32px; margin-top:20px; color:#00d9ff;">Score : 0</div>
    <div id="restart">새로고침하여 다시 시작</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0a0f1f, 80, 400);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // LIGHTING
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(50, 100, 20);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 512;
    dirLight.shadow.mapSize.height = 512;
    scene.add(dirLight);

    // SKY
    const skyGeo = new THREE.SphereGeometry(500, 16, 16);
    const skyMat = new THREE.MeshBasicMaterial({
      color: 0x101a38,
      side: THREE.BackSide
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // ROAD
    const roadGroup = new THREE.Group();
    scene.add(roadGroup);

    const roadTextureCanvas = document.createElement('canvas');
    roadTextureCanvas.width = 512;
    roadTextureCanvas.height = 512;
    const ctx = roadTextureCanvas.getContext('2d');

    ctx.fillStyle = '#2f2f2f';
    ctx.fillRect(0,0,512,512);

    for(let i=0;i<512;i+=32){
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(0,i,512,16);
    }

    ctx.fillStyle = 'white';
    ctx.fillRect(246,0,20,512);

    const roadTexture = new THREE.CanvasTexture(roadTextureCanvas);
    roadTexture.wrapS = THREE.RepeatWrapping;
    roadTexture.wrapT = THREE.RepeatWrapping;
    roadTexture.repeat.set(1, 30);

    const roadMat = new THREE.MeshStandardMaterial({
      map: roadTexture,
      roughness: 0.9,
      metalness: 0.1
    });

    const road = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 1000),
      roadMat
    );

    road.rotation.x = -Math.PI / 2;
    road.receiveShadow = true;
    scene.add(road);

    // STARS
    const starsGeometry = new THREE.BufferGeometry();
    const starVertices = [];

    for (let i = 0; i < 700; i++) {
      starVertices.push((Math.random() - 0.5) * 1000);
      starVertices.push(Math.random() * 500);
      starVertices.push((Math.random() - 0.5) * 1000);
    }

    starsGeometry.setAttribute(
      'position',
      new THREE.Float32BufferAttribute(starVertices, 3)
    );

    const starsMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.7
    });

    const starField = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(starField);

    // NEON LIGHTS
    function createNeonLight(x, z, color) {
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.2, 8),
        new THREE.MeshStandardMaterial({ color: 0x888888 })
      );

      pole.position.set(x, 4, z);
      pole.castShadow = true;

      const glow = new THREE.PointLight(color, 1.5, 18);
      glow.position.set(x, 8, z);

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 16, 16),
        new THREE.MeshBasicMaterial({ color })
      );

      sphere.position.set(x, 8, z);

      scene.add(pole);
      scene.add(glow);
      scene.add(sphere);
    }

    for(let z = -20; z > -700; z -= 50) {
      createNeonLight(-18, z, 0x00d9ff);
      createNeonLight(18, z, 0xff006e);
    }

    // PLAYER CAR
    const car = new THREE.Group();

    const body = new THREE.Mesh(
      new THREE.BoxGeometry(3, 1, 6),
      new THREE.MeshStandardMaterial({
        color: 0xff2200,
        metalness: 0.8,
        roughness: 0.2
      })
    );

    body.castShadow = true;
    body.position.y = 1;
    car.add(body);

    const top = new THREE.Mesh(
      new THREE.BoxGeometry(2.2, 1, 3),
      new THREE.MeshStandardMaterial({
        color: 0x111111,
        metalness: 0.5,
        roughness: 0.1
      })
    );

    top.position.set(0, 1.8, -0.2);
    top.castShadow = true;
    car.add(top);

    function createWheel(x, z) {
      const wheel = new THREE.Mesh(
        new THREE.CylinderGeometry(0.7, 0.7, 0.6, 12),
        new THREE.MeshStandardMaterial({ color: 0x111111 })
      );

      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(x, 0.5, z);
      wheel.castShadow = true;
      car.add(wheel);
    }

    createWheel(-1.6, -2);
    createWheel(1.6, -2);
    createWheel(-1.6, 2);
    createWheel(1.6, 2);

    car.position.y = 0;
    scene.add(car);

    // BOOST FLAME EFFECT
    const flame = new THREE.Mesh(
      new THREE.ConeGeometry(0.5, 2, 12),
      new THREE.MeshBasicMaterial({
        color: 0xff6600,
        transparent: true,
        opacity: 0.9
      })
    );

    flame.rotation.x = Math.PI;
    flame.position.set(0, 1, 4);
    flame.visible = false;
    car.add(flame);

    // SHIELD EFFECT
    const shieldEffect = new THREE.Mesh(
      new THREE.SphereGeometry(3.2, 16, 16),
      new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity: 0.18,
        wireframe: true
      })
    );

    shieldEffect.visible = false;
    car.add(shieldEffect);

    // BOOST ITEMS
    const boosts = [];

    function createBoost(zPos) {
      const boost = new THREE.Mesh(
        new THREE.TorusGeometry(1, 0.25, 8, 12),
        new THREE.MeshBasicMaterial({
          color: 0x00ffff
        })
      );

      boost.rotation.x = Math.PI / 2;

      boost.position.set(
        (Math.random() - 0.5) * 18,
        1.5,
        zPos
      );

      scene.add(boost);
      boosts.push(boost);
    }

    for(let i = 0; i < 8; i++) {
      createBoost(-i * 120 - 100);
    }

    // OBSTACLES
    const obstacles = [];
    const collectibleItems = [];
    const shields = [];

    function createObstacle(zPos) {
      const geometries = [
        new THREE.BoxGeometry(3,3,3),
        new THREE.CylinderGeometry(1.5,1.5,4,12),
        new THREE.ConeGeometry(2,4,12),
        new THREE.DodecahedronGeometry(2)
      ];

      const geometry = geometries[Math.floor(Math.random()*geometries.length)];

      const obstacle = new THREE.Mesh(
        geometry,
        new THREE.MeshStandardMaterial({
          color: Math.random() * 0xffffff,
          metalness: 0.5,
          roughness: 0.5,
          emissive: 0x111111
        })
      );

      obstacle.position.set(
        (Math.random() - 0.5) * 20,
        1.5,
        zPos
      );

      obstacle.castShadow = true;
      scene.add(obstacle);
      obstacles.push(obstacle);
      return obstacle;
    }

    for(let i = 0; i < 8; i++) {
      createObstacle(-i * 80 - 120);
    }

    function createCollectible(zPos) {
      const item = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.8, 0),
        new THREE.MeshBasicMaterial({ color: 0xffff00 })
      );

      item.position.set(
        (Math.random() - 0.5) * 18,
        1.5,
        zPos
      );

      scene.add(item);
      collectibleItems.push(item);
    }

    function createShield(zPos) {
      const shield = new THREE.Mesh(
        new THREE.IcosahedronGeometry(1, 0),
        new THREE.MeshBasicMaterial({ color: 0x00ff88 })
      );

      shield.position.set(
        (Math.random() - 0.5) * 18,
        1.5,
        zPos
      );

      scene.add(shield);
      shields.push(shield);
    }

    for(let i = 0; i < 6; i++) {
      createCollectible(-i * 180 - 150);
    }

    for(let i = 0; i < 3; i++) {
      createShield(-i * 500 - 300);
    }

    // PARTICLES
    const particles = [];

    function createParticle() {
      const p = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );

      p.position.set(
        car.position.x + (Math.random()-0.5)*2,
        0.5,
        car.position.z + 3
      );

      scene.add(p);
      particles.push(p);
    }

    // CONTROLS
    const keys = {};

    window.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
    });

    window.addEventListener('keyup', e => {
      keys[e.key.toLowerCase()] = false;
    });

    // GAME VARIABLES
    let speed = 0;
    let maxSpeed = 2.2;
    let gameOver = false;
    let score = 0;
    let shieldActive = false;
    let obstacleSpawnTimer = 0;

    // CAMERA POSITION LIKE ASPHALT
    camera.position.set(0, 6, 12);

    function animate() {
      setTimeout(() => {
        requestAnimationFrame(animate);
      }, 1000 / 75);

      if(!gameOver) {
        // MOVEMENT
        if(keys['w']) {
          speed += 0.02;
        }

        if(keys['s']) {
          speed -= 0.02;
        }

        if(keys['shift']) {
          speed *= 0.95;
        }

        speed *= 0.99;

        speed = Math.max(-1, Math.min(maxSpeed, speed));

        if(keys['a']) {
          car.position.x -= 0.2 + speed * 0.05;
          car.rotation.z = 0.12;
        }
        else if(keys['d']) {
          car.position.x += 0.2 + speed * 0.05;
          car.rotation.z = -0.12;
        }
        else {
          car.rotation.z *= 0.85;
        }

        car.position.x = Math.max(-12, Math.min(12, car.position.x));

        // ITEM UPDATE
        collectibleItems.forEach(item => {
          item.position.z += speed * 2;
          item.rotation.y += 0.05;

          if(item.position.z > 20) {
            item.position.z = -1800 - Math.random() * 1000;
            item.position.x = (Math.random()-0.5) * 18;
          }

          const dx = item.position.x - car.position.x;
          const dz = item.position.z - car.position.z;

          if(Math.abs(dx) < 2 && Math.abs(dz) < 4) {
            score += 300;
            item.position.z = -1800 - Math.random() * 1000;
            item.position.x = (Math.random()-0.5) * 18;
          }
        });

        // SHIELD UPDATE
        shields.forEach(shield => {
          shield.position.z += speed * 2;
          shield.rotation.x += 0.04;
          shield.rotation.y += 0.04;

          if(shield.position.z > 20) {
            shield.position.z = -3500 - Math.random() * 1500;
            shield.position.x = (Math.random()-0.5) * 18;
          }

          const dx = shield.position.x - car.position.x;
          const dz = shield.position.z - car.position.z;

          if(Math.abs(dx) < 2 && Math.abs(dz) < 4) {
            shieldActive = true;
            shieldEffect.visible = true;
            shield.position.z = -3500 - Math.random() * 1500;
            shield.position.x = (Math.random()-0.5) * 18;
          }
        });

        // BOOST UPDATE
        boosts.forEach(boost => {
          boost.position.z += speed * 2;
          boost.rotation.z += 0.05;

          if(boost.position.z > 20) {
            boost.position.z = -1800;
            boost.position.x = (Math.random()-0.5) * 18;
          }

          const dx = boost.position.x - car.position.x;
          const dz = boost.position.z - car.position.z;

          if(Math.abs(dx) < 2 && Math.abs(dz) < 4) {
            speed += 0.8;
            score += 150;

            boost.position.z = -1800;
            boost.position.x = (Math.random()-0.5) * 18;
          }
        });

        // DYNAMIC OBSTACLE SPAWN
        obstacleSpawnTimer += 1;

        if(obstacleSpawnTimer >= 140) {
          obstacleSpawnTimer = 0;

          const lanes = [-10, -5, 0, 5, 10];

          for(let i = 0; i < 5; i++) {
            const obstacle = createObstacle(-1800 - (i * 90));
            obstacle.position.x = lanes[Math.floor(Math.random() * lanes.length)];
          }
        }

        // MOVE WORLD
        if(obstacles.length > 35) {
          const oldObstacle = obstacles.shift();
          scene.remove(oldObstacle);
        }

        obstacles.forEach(obstacle => {
          obstacle.position.z += speed * 2;

          obstacle.rotation.x += 0.01;
          obstacle.rotation.y += 0.02;

          if(obstacle.position.z > 20) {
            obstacle.position.z = -1200 - Math.random() * 1200;
            obstacle.position.x = (Math.random()-0.5)*20;
          }

          // COLLISION
          const dx = obstacle.position.x - car.position.x;
          const dz = obstacle.position.z - car.position.z;

          if(Math.abs(dx) < 2.5 && Math.abs(dz) < 4) {
            if(shieldActive) {
              shieldActive = false;
              shieldEffect.visible = false;
              obstacle.position.z = -1200 - Math.random() * 1200;
              obstacle.position.x = (Math.random()-0.5)*20;
            } else {
              gameOver = true;
              document.getElementById('gameOver').style.display = 'block';
              document.getElementById('finalScore').innerText = 'Score : ' + Math.floor(score);
            }
          }
        });

        // FLAME EFFECT
        if(speed > 1.4) {
          flame.visible = true;
          flame.scale.y = 1 + Math.random() * 0.6;
        } else {
          flame.visible = false;
        }

        // ROAD ANIMATION
        roadTexture.offset.y -= speed * 0.02;

        // CAMERA FOLLOW
        camera.position.x += (car.position.x - camera.position.x) * 0.08;
        camera.lookAt(car.position.x, 1, -20);

        // PARTICLES
        if(speed > 1) {
          if(Math.random() > 0.7) createParticle();
        }

        for(let i = particles.length - 1; i >= 0; i--) {
          particles[i].position.z += 0.5;
          particles[i].material.opacity = 0.95;

          if(particles[i].position.z > 20) {
            scene.remove(particles[i]);
            particles.splice(i,1);
          }
        }

        // SCORE
        score += Math.abs(speed) * 0.5;

        // HUD
        document.getElementById('speed').innerText =
          'Speed : ' + Math.floor(Math.abs(speed) * 180) + ' km/h';

        document.getElementById('score').innerText =
          'Score : ' + Math.floor(score);
      }

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
      starField.rotation.y += 0.0005;

      renderer.render(scene, camera);
    }

    animate();

    // RESIZE
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
